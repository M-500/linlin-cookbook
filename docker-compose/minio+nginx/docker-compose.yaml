version: '3.8'

services:
  miniov1:
#    image: "bitnami/minio:latest"
    image: minio/minio:latest
    container_name: miniov1
    ports:
      - "9000:9000"     # S3 API 端口
      - "9001:9001"     # 控制台端口
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin@123.ZeRo_One
    volumes:
#      - /mnt/data/minio-data-v1:/data
      - ./data:/data
    command: server /data --console-address ":9001"
    networks:
      - minio_net
    restart: always  # 容器意外退出时自动重启

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - miniov1
    networks:
      - minio_net
    restart: always  # 容器意外退出时自动重启

networks:
  minio_net:
    driver: bridge